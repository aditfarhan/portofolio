name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint · Type-check · Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  lighthouse:
    name: Lighthouse CI · report-only
    runs-on: ubuntu-latest
    needs: quality
    # Report-only: assertions in .lighthouserc.json are "warn" and this step
    # cannot fail the pipeline. Promote them to "error" once the baseline is green.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Lighthouse CI
        run: npx --yes @lhci/cli@0.14.x autorun
        continue-on-error: true
